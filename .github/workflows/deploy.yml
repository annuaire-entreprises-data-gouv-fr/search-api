name: Deploy cluster
permissions:
    contents: read
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Sanitize branch name
        run: echo "branch_name=$(echo '${{ github.ref_name }}' | sed 's/^[^\/]*\///')" >> $GITHUB_OUTPUT
        id: sanitize
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GITLAB_REGISTRY_URL }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_PAT }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: release
          tags: |
            ${{ secrets.GITLAB_REGISTRY_URL }}/etalab/data.gouv.fr/infra/ade-api:${{ github.sha }}
            ${{ secrets.GITLAB_REGISTRY_URL }}/etalab/data.gouv.fr/infra/ade-api:${{ steps.sanitize.outputs.branch_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  deploy-staging-new:
    name: Deploy - staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-docker]
    environment:
      name: staging
    strategy:
      matrix:
        include:
          - environment: staging-04
            host: SSH_HOST_STAGING_04
    steps:
      - uses: actions/checkout@v6
      - uses: annuaire-entreprises-data-gouv-fr/github-actions/.github/actions/deploy@v2.0
        with:
          app: "api"
          version: "${{ (inputs.tag || github.sha) }}"
          environment: "${{ matrix.environment }}"
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY_GITHUB_APP_DEPLOYER }}
          ssh-host: ${{ secrets[matrix.host] }}
          notify-on-failure: false
          notify-on-success: false
          tchap-url: ${{ secrets.TCHAP_URL }}
          tchap-token: ${{ secrets.TCHAP_TOKEN }}

jobs:
  deploy-staging:
    name: Deploy on staging
    runs-on: ubuntu-latest
    environment:
      name: staging

    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - environment: staging-03
            host: SSH_HOST_STAGING_03
    steps:
      - uses: actions/checkout@v4
      - uses: annuaire-entreprises-data-gouv-fr/github-actions/.github/actions/deploy@v1.1
        with:
          app-to-deploy: "annuaire-entreprises-search-api"
          app-repository: "https://github.com/annuaire-entreprises-data-gouv-fr/search-api.git"
          app-shortname: "api"
          version: "main"
          environment: "${{ matrix.environment }}"
          ssh-key: ${{ secrets.SSH_MACHINE_USER_PRIVATE_KEY }}
          ssh-host: ${{ secrets[matrix.host] }}
          notify-on-failure: true
          notify-on-success: true
          tchap-url: ${{ secrets.TCHAP_URL }}
          tchap-token: ${{ secrets.TCHAP_TOKEN }}
  deploy-production:
    name: Deploy on production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production

    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - environment: production-01
            host: SSH_HOST_PRODUCTION_01
          - environment: production-02
            host: SSH_HOST_PRODUCTION_02
          - environment: production-03
            host: SSH_HOST_PRODUCTION_03
    steps:
      - uses: actions/checkout@v4
      - uses: annuaire-entreprises-data-gouv-fr/github-actions/.github/actions/deploy@v1.1
        with:
          app-to-deploy: "annuaire-entreprises-search-api"
          app-repository: "https://github.com/annuaire-entreprises-data-gouv-fr/search-api.git"
          app-shortname: "api"
          version: "main"
          environment: "${{ matrix.environment }}"
          ssh-key: ${{ secrets.SSH_MACHINE_USER_PRIVATE_KEY }}
          ssh-host: ${{ secrets[matrix.host] }}
          notify-on-failure: true
          notify-on-success: true
          tchap-url: ${{ secrets.TCHAP_URL }}
          tchap-token: ${{ secrets.TCHAP_TOKEN }}
